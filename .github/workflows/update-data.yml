name: Update macro dashboard data (FRED + yfinance only)

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas

      - name: Run data fetch script (FRED + yfinance only, KOSIS/customs preserved)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_macro_data_github.py

      - name: Commit and push data.js if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || git commit -m "Auto-update macro dashboard data (FRED + yfinance)"
          git push
