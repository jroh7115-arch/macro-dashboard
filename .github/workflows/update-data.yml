name: Update macro dashboard data

on:
  schedule:
    - cron: '0 0 20 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas holidays

      - name: Run data fetch script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          CUSTOMS_SERVICE_KEY: ${{ secrets.CUSTOMS_SERVICE_KEY }}
        run: python fetch_macro_data_github.py

      - name: Commit and push data.js if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || git commit -m "Auto-update macro dashboard data"
          git push
